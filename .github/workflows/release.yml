name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build package — fail fast before tagging
      - name: Build
        run: npm run build

      # 5. Run tests
      - name: Test
        run: npm test

      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the latest semver tag, default to v0.0.0 if none exists
          LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"
 
      - name: Bump patch version
        id: bump_version
        run: |
          LATEST="${{ steps.get_latest_tag.outputs.latest_tag }}"
          # Strip the leading 'v'
          VERSION="${LATEST#v}"
          # Split into major, minor, patch
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          # Increment patch
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New tag: $NEW_TAG"
 
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.bump_version.outputs.new_tag }}
          git push origin ${{ steps.bump_version.outputs.new_tag }}
 
      - name: Create GitHub Release (mark as latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump_version.outputs.new_tag }}
          name: "Release ${{ steps.bump_version.outputs.new_tag }}"
          body: |
            ## What's Changed
            Automated release from push to `main` branch.
 
            **Commit:** ${{ github.sha }}
            **Pushed by:** ${{ github.actor }}
          make_latest: true   # Marks this as the "Latest" release on GitHub
          generate_release_notes: true  # Auto-generates notes from commits/PRs

      # 7. Publish to npm
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

